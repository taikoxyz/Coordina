# IPFS Sidecar Container Spec
# Reference: Issue #168 Section 5 - Layer 2 Infrastructure Optimization
# 
# This spec defines an IPFS sidecar container to be added to agent pods.
# IPFS provides decentralized storage for agent state, artifacts, and cross-agent data sharing.
#
# Usage: Include this container in the agent StatefulSet spec.template.spec.containers array
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ipfs-sidecar-config
  namespace: team-d-squad
  labels:
    coordina.component: ipfs-sidecar
data:
  ipfs-config.yaml: |
    # IPFS configuration for agent sidecar
    version: 0.28.0
    
    # Storage path (mounted from agent PVC)
    storagePath: /data/ipfs
    
    # Swarm addresses - customize for your network
    swarmAddresses:
      - /ip4/0.0.0.0/tcp/4001
      - /ip4/0.0.0.0/udp/4002/quic
      - /ip4/0.0.0.0/udp/4003/quic-v1
      - /ip4/0.0.0.0/udp/4004/quic-v1/webtransport
    
    # API server
    api:
      address: /ip4/127.0.0.1/tcp/5001
      allowedOrigins: "*"
    
    # Gateway server
    gateway:
      address: /ip4/127.0.0.1/tcp/8080
      rootRedirect: ""
    
    # Bootstrap nodes (add your cluster peers)
    bootstrap:
      - /ip4/127.0.0.1/tcp/4001/p2p/QmBootstrapNode
    
    # Resource limits
    resources:
      # Low power mode for sidecar
      lowPowerMode: true
      
      # GC interval (hours)
      gcInterval: 24
      
      # Maximum storage size (GB)
      storageMax: 10
      
    # Enable pinning service
    pinning:
      enabled: true
      remoteServices: []
    
    # Logging
    logging:
      level: info
      format: json
---
# IPFS Sidecar Container Definition
# Add this to agent StatefulSet containers array
- name: ipfs
  image: ipfs/kubo:v0.28.0
  imagePullPolicy: IfNotPresent
  
  # Volume mounts for persistent storage
  volumeMounts:
    - name: ipfs-data
      mountPath: /data/ipfs
    - name: ipfs-config
      mountPath: /etc/ipfs
      readOnly: true
  
  # Environment variables
  env:
    - name: IPFS_PATH
      value: /data/ipfs
    - name: IPFS_CONFIG_PATH
      value: /etc/ipfs/ipfs-config.yaml
  
  # Resource limits - lightweight sidecar
  resources:
    requests:
      cpu: "100m"
      memory: "128Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  
  # Health checks
  livenessProbe:
    tcpSocket:
      port: 5001
    initialDelaySeconds: 30
    periodSeconds: 30
    failureThreshold: 3
  
  readinessProbe:
    tcpSocket:
      port: 5001
    initialDelaySeconds: 10
    periodSeconds: 10
    failureThreshold: 3
  
  # Startup probe for slow initialization
  startupProbe:
    tcpSocket:
      port: 5001
    initialDelaySeconds: 5
    periodSeconds: 10
    failureThreshold: 30
  
  # Security context
  securityContext:
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
    capabilities:
      drop:
        - ALL
      add:
        - NET_BIND_SERVICE
  
  # Lifecycle hooks
  lifecycle:
    preStop:
      exec:
        command:
          - ipfs
          - shutdown
---
# Volume definitions to add to pod spec
# volumes:
#   - name: ipfs-data
#     persistentVolumeClaim:
#       claimName: ${TEAM_SLUG}-agent-${AGENT_SLUG}
#   - name: ipfs-config
#     configMap:
#       name: ipfs-sidecar-config
---
# ServiceAccount for IPFS (if needed)
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ipfs-sidecar
  namespace: team-d-squad
  labels:
    coordina.component: ipfs-sidecar
---
# RBAC for IPFS sidecar
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ipfs-sidecar
  namespace: team-d-squad
  labels:
    coordina.component: ipfs-sidecar
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ipfs-sidecar
  namespace: team-d-squad
  labels:
    coordina.component: ipfs-sidecar
subjects:
  - kind: ServiceAccount
    name: ipfs-sidecar
    namespace: team-d-squad
roleRef:
  kind: Role
  name: ipfs-sidecar
  apiGroup: rbac.authorization.k8s.io
