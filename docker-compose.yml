services:
  platform-api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      DATABASE_PATH: /data/coordina.db
      PORT: "8080"
      GOOGLE_OAUTH_CLIENT_ID: "${GOOGLE_OAUTH_CLIENT_ID}"
      GOOGLE_OAUTH_CLIENT_SECRET: "${GOOGLE_OAUTH_CLIENT_SECRET}"
      GOOGLE_REDIRECT_BASE: "${GOOGLE_REDIRECT_BASE:-http://localhost:3000}"
    volumes:
      - platform_data:/data
      - team_shared:/mnt/team
      - gcloud_config:/root/.config/gcloud
      - gcloud_workspace_config:/root/.config/gcloud-workspace
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
      args:
        INTERNAL_API_URL: "http://platform-api:8080"
    ports:
      - "${UI_PORT:-3000}:3000"
    environment:
      INTERNAL_API_URL: "http://platform-api:8080"
    depends_on:
      - platform-api
    restart: unless-stopped

  # Example agent container — replace MEMBER_ID with actual value
  # Uncomment and duplicate for each team member.
