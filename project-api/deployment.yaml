apiVersion: apps/v1
kind: Deployment
metadata:
  name: project-api
  namespace: team-d-squad
  labels:
    app: project-api
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: project-api
  template:
    metadata:
      labels:
        app: project-api
        version: v1
    spec:
      containers:
      - name: project-api
        image: project-api:latest
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 19876
          name: http
        env:
        - name: PORT
          value: "19876"
        - name: DB_PATH
          value: /data/project-api.db
        volumeMounts:
        - name: data
          mountPath: /data
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "1000m"
        livenessProbe:
          httpGet:
            path: /health
            port: 19876
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /health
            port: 19876
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: project-api
  namespace: team-d-squad
spec:
  type: ClusterIP
  ports:
  - port: 19876
    targetPort: 19876
    protocol: TCP
    name: http
  selector:
    app: project-api
